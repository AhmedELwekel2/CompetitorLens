version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: competitorlens
      POSTGRES_PASSWORD: competitorlens_secret
      POSTGRES_DB: competitorlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competitorlens"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://competitorlens:competitorlens_secret@db:5432/competitorlens
    volumes:
      - ./ai_api:/app/ai_api:ro

volumes:
  pgdata:
