# =============================================================
# CompetitorLens — Nginx config for sx.thetransformix.com
# =============================================================
# 
# USAGE:
#   Option A: Copy into existing diomedia-nginx container
#     docker cp nginx/sx.thetransformix.com.conf diomedia-nginx:/etc/nginx/conf.d/competitorlens.conf
#     docker exec diomedia-nginx nginx -t && docker exec diomedia-nginx nginx -s reload
#
#   Option B: Use on host's native nginx
#     sudo cp nginx/sx.thetransformix.com.conf /etc/nginx/sites-available/sx.thetransformix.com
#     sudo ln -sf /etc/nginx/sites-available/sx.thetransformix.com /etc/nginx/sites-enabled/
#     sudo nginx -t && sudo systemctl reload nginx
#
# IMPORTANT: Replace host.docker.internal with 172.17.0.1 if running inside Docker container
# =============================================================

# ─── HTTP → redirect to HTTPS (uncomment after SSL is set up) ───
# server {
#     listen 80;
#     server_name sx.thetransformix.com;
#     return 301 https://$host$request_uri;
# }

# ─── HTTP only (use this BEFORE setting up SSL) ───
server {
    listen 80;
    server_name sx.thetransformix.com;

    location / {
        # Use 172.17.0.1 instead of host.docker.internal if this runs inside a container
        proxy_pass http://host.docker.internal:3030;
        proxy_http_version 1.1;
        
        # WebSocket / SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE (Server-Sent Events) support for streaming analysis
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }
}

