version: "3.9"

services:
  # ─── Database ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: competitorlens
      POSTGRES_PASSWORD: competitorlens_secret
      POSTGRES_DB: competitorlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U competitorlens"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://competitorlens:competitorlens_secret@db:5432/competitorlens
      DATABASE_URL_SYNC: postgresql://competitorlens:competitorlens_secret@db:5432/competitorlens

  # ─── Flask AI API (Selenium + Transformers) ──────────────────────────────
  ai-api:
    build:
      context: .
      dockerfile: ai_api/Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ai_api/.env
    environment:
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
    shm_size: "2gb"

  # ─── Next.js Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - ai-api
    environment:
      BACKEND_URL: http://backend:8000
      AI_API_HOST: ai-api
      AI_API_PORT: "5000"
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

volumes:
  pgdata: