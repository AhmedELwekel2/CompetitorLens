# =============================================================
# CompetitorLens — Nginx config for sx.thetransformix.com
# =============================================================
# 
# USAGE (safe — does NOT affect existing sites):
#
#   docker cp nginx/sx.thetransformix.com.conf diomedia-nginx:/etc/nginx/conf.d/competitorlens.conf
#   docker exec diomedia-nginx nginx -t
#   docker exec diomedia-nginx nginx -s reload
#
# NOTE: Replace 172.17.0.1 with your Docker bridge IP if different
#       Run: ip route | grep docker0 | awk '{print $9}'
# =============================================================

# ─── HTTP (use this BEFORE setting up SSL) ───
server {
    listen 80;
    server_name sx.thetransformix.com;

    location / {
        proxy_pass http://172.17.0.1:3030;
        proxy_http_version 1.1;

        # WebSocket / SSE support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) for streaming analysis
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        chunked_transfer_encoding on;
    }
}

